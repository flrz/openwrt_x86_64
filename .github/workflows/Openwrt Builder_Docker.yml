name: OpenWrt 25.12 Builder (Docker + Release)

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-25.12
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free Up Disk Space (Critical)
        run: |
          echo "Before cleanup: $(df -h /)"
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo docker system prune -a -f --volumes
          sudo apt-get clean
          echo "After cleanup: $(df -h /)"

      - name: Build OpenWrt with Go/Rust Patches
        run: |
          docker run --rm --privileged \
            -v "$(pwd)":/workspace \
            -e REPO_URL=${{ env.REPO_URL }} \
            -e REPO_BRANCH=${{ env.REPO_BRANCH }} \
            -e TZ=${{ env.TZ }} \
            p3terx/openwrt-build-env:latest \
            bash -c '
              set -e
              cd /workspace
              echo "=== OpenWrt 25.12 Build Start ==="

              [ -f diy-part1.sh ] && chmod +x diy-part1.sh && ./diy-part1.sh || true

              git clone --depth=1 -b $REPO_BRANCH $REPO_URL openwrt
              cd openwrt

              [ -f ../feeds.conf.default ] && cp ../feeds.conf.default . || true
              [ -f ../.config ] && cp ../.config . || true

              ./scripts/feeds update -a
              ./scripts/feeds install -a

              # === Golang + Rust 补丁 ===
              echo "Applying golang & rust patches from master..."
              rm -rf /tmp/packages 2>/dev/null || true
              git clone --depth=1 -b master --single-branch https://github.com/openwrt/packages.git /tmp/packages

              for lang in golang rust; do
                if [ -d "/tmp/packages/lang/$lang" ]; then
                  rm -rf feeds/packages/lang/$lang
                  cp -r /tmp/packages/lang/$lang feeds/packages/lang/
                  echo "✓ Updated $lang from master"
                fi
              done
              rm -rf /tmp/packages

              if [ -f "feeds/packages/lang/rust/Makefile" ]; then
                sed -i "s/--set=llvm.download-ci-llvm=true/--set=llvm.download-ci-llvm=false/" feeds/packages/lang/rust/Makefile || true
                sed -i "/x\.py \\/a \ \ --ci false \\" feeds/packages/lang/rust/Makefile || true
                echo "✓ Applied rust build flags patch"
              fi

              ./scripts/feeds update -a
              ./scripts/feeds install -a

              [ -f ../diy-part2.sh ] && chmod +x ../diy-part2.sh && ../diy-part2.sh || true

              make defconfig

              echo "Downloading packages..."
              make download -j2 || true

              echo "Compiling firmware... (using 2 threads for stability)"
              make -j2 V=s || make -j1 V=s

              # 整理固件
              mkdir -p /workspace/firmware
              cp -r bin/targets/*/* /workspace/firmware/ 2>/dev/null || true
              echo "Build completed!"
              ls -lh /workspace/firmware/
            '

      - name: Upload Firmware Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenWrt-25.12_firmware
          path: ./firmware/
          retention-days: 7

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ format('25.12-{0}', github.run_number) }}   # 或使用日期: $(date +"%Y.%m.%d")
          name: OpenWrt 25.12 Custom Build
          body: |
            **Build Date:** $(date '+%Y-%m-%d %H:%M:%S %Z')
            **Branch:** openwrt-25.12
            **Note:** Golang & Rust patches applied from master branch.
          files: |
            ./firmware/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
