name: Openwrt Builder_25.12_FAST

on:
  repository_dispatch:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-25.12
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  CCACHE_SIZE: 4G
  GOPROXY: https://proxy.golang.org,direct

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      actions: write      
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Maximize Build Space
      run: |
        sudo -E rm -rf /usr/share/dotnet /etc/mysql /etc/php /usr/local/lib/android /opt/ghc /usr/local/.rustup
        sudo docker image prune --all --force
        df -hT

    - name: Initialize Build Environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt-get -qq update
        # Install only essential build tools to save time
        sudo -E apt-get -qq install -y \
            autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache cmake cpio curl device-tree-compiler flex gawk gettext gcc-multilib \
            g++-multilib git gnutls-dev gperf help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
            libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev \
            libreadline-dev libssl-dev libtool libz-dev lld llvm lrzsz mkisofs nano \
            ninja-build p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils \
            python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo \
            unzip vim wget xmlto xxd zlib1g-dev zstd
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir
        echo "Build environment ready"

    - name: Restore ccache Cache
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        # Branch-specific cache key - all commits on same branch share it
        key: ${{ runner.os }}-ccache-${{ github.ref_name }}
        restore-keys: |
          ${{ runner.os }}-ccache-main
          ${{ runner.os }}-ccache-

    - name: Restore OpenWrt dl Folder
      uses: actions/cache@v4
      with:
        path: /workdir/openwrt/dl
        # Based on feeds.conf.default - only changes when feeds change
        key: ${{ runner.os }}-dl-${{ hashFiles('feeds.conf.default') }}
        restore-keys: |
          ${{ runner.os }}-dl-
        
    - name: Clone OpenWrt Source
      working-directory: /workdir
      run: |
        git clone --depth=1 $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt
        cd openwrt && git log -1 --format='%H %s'

    - name: Configure ccache
      run: |
        export CCACHE_DIR=~/.ccache
        ccache -M $CCACHE_SIZE
        ccache -z  # Reset stats
        mkdir -p $CCACHE_DIR
        echo "CCACHE configured: $CCACHE_SIZE"

    - name: Load Custom Feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Update and Install Feeds
      run: |
        cd openwrt
        echo "Updating feeds..."
        ./scripts/feeds update -a -f
        
        echo "Installing feeds..."
        ./scripts/feeds install -a -p passwall 2>/dev/null || true
        ./scripts/feeds install -a -p openclash 2>/dev/null || true
        ./scripts/feeds install -a
        
        echo "Applying 25.12 patches..."
        # Quick patches for golang/rust
        rm -rf temp_resp
        git clone --depth=1 -b master --single-branch https://github.com/openwrt/packages.git temp_resp 2>/dev/null || true
        [ -d "temp_resp/lang/golang" ] && rm -rf feeds/packages/lang/golang && cp -r temp_resp/lang/golang feeds/packages/lang/
        [ -d "temp_resp/lang/rust" ] && rm -rf feeds/packages/lang/rust && cp -r temp_resp/lang/rust feeds/packages/lang/
        rm -rf temp_resp
        
        # Patch rust
        sed -i 's/--set=llvm\.download-ci-llvm=true/--set=llvm.download-ci-llvm=false/' feeds/packages/lang/rust/Makefile 2>/dev/null || true
        
        ./scripts/feeds update -a
        ./scripts/feeds install -a
        
        # Minimal config
        echo "CONFIG_ALL_NONSHARED=n" > .config
        echo "CONFIG_ALL_KMODS=n" >> .config
        echo "CONFIG_ALL=n" >> .config
        make defconfig

    - name: Load Custom Configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: Download package
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j16
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: Compile Firmware (Optimized)
      id: compile
      run: |
        cd openwrt
        export CCACHE_DIR=~/.ccache
        export CC="ccache gcc"
        export CXX="ccache g++"
        
        echo "Starting compilation with $(nproc) CPU cores..."
        
        # Full parallel build attempt
        if make -j$(nproc) V=s 2>&1 | tee build.log; then
          echo "✓ Build succeeded"
        else
          echo "⚠ Full parallel build failed, retrying with reduced jobs..."
          make -j$(($(nproc) / 2)) V=s 2>&1 | tee -a build.log || make -j1 V=s
        fi
        
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Show Build Statistics
      if: always()
      run: |
        echo "=== ccache Statistics ==="
        ccache -s
        echo ""
        echo "=== Disk Usage ==="
        df -hT
        echo ""
        echo "=== Build Directory Size ==="
        du -sh /workdir/openwrt/bin 2>/dev/null || echo "No bin directory"

    - name: Organize Firmware Files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        mkdir -p firmware_output
        cd openwrt/bin/targets/*/*
        rm -rf packages
        cp -r * $GITHUB_WORKSPACE/firmware_output/ 2>/dev/null || true
        echo "FIRMWARE=$GITHUB_WORKSPACE/firmware_output" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload Firmware
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}
        retention-days: 3
        compression-level: 6

    - name: Generate Release Tag
      id: tag
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      run: |
        echo "release_tag=$(date +"%Y.%m.%d-%H%M")" >> $GITHUB_OUTPUT
        {
          echo "# OpenWrt 25.12 Build Report"
          echo "**Build Date:** $(date)"
          echo "**Repository:** $REPO_URL/$REPO_BRANCH"
          echo ""
          echo "## Build Information"
          echo "- Device: $(cat /workdir/openwrt/DEVICE_NAME 2>/dev/null || echo 'Unknown')"
          echo "- Firmware: Available in artifacts"
        } > release.txt
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Cleanup Old Artifacts
      uses: Mattraks/delete-workflow-runs@main
      with:
        retain_days: 0
        keep_minimum_runs: 2

    - name: Cleanup Old Releases
      uses: dev-drprasad/delete-older-releases@master
      if: env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        keep_latest: 3
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
