#
# Openwrt 25.12 with Passwall and OpenClash (Speed Optimized)
#

name: Openwrt Builder_25.12_Optimized

on:
  repository_dispatch:
  workflow_dispatch:

env:
  REPO_URL: https://github.com
  REPO_BRANCH: openwrt-25.12
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_BIN_DIR: false
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-24.04
    permissions:
      actions: write      
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialization environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        # 精简初始化，只删除必要大文件，跳过耗时的 docker prune
        sudo -E rm -rf /usr/share/dotnet /etc/mysql /etc/php /usr/local/lib/android
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install build-essential clang flex gawk gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev ccache swig
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo -E timedatectl set-timezone "Asia/Shanghai"
        sudo mkdir -p /workdir
        sudo chown $USER:$GROUPS /workdir

    - name: Clone source code
      working-directory: /workdir
      run: |
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: Cache Build Dependencies
      uses: actions/cache@v4
      with:
        path: |
          openwrt/dl
          ~/.ccache
          ~/.cargo/registry
          ~/.cargo/git
          ~/go/pkg/mod
        # Key 包含 OS 和分支信息，即便配置微调也能命中大部分缓存
        key: ${{ runner.os }}-openwrt-2512-${{ hashFiles('**/config') }}
        restore-keys: |
          ${{ runner.os }}-openwrt-2512-

    - name: Load custom feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: Update & Install feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Apply Patches (Golang & Rust)
      run: |
        cd openwrt
        # 这里保留你原有的针对 25.12 的 Golang/Rust 补丁逻辑
        rm -rf temp_resp
        git clone -b master --single-branch https://github.com temp_resp
        rm -rf feeds/packages/lang/golang feeds/packages/lang/rust
        cp -r temp_resp/lang/golang feeds/packages/lang
        cp -r temp_resp/lang/rust feeds/packages/lang
        rm -rf temp_resp
        
        # 修复 Rust 编译报错
        sed -i 's/--set=llvm\.download-ci-llvm=true/--set=llvm.download-ci-llvm=false/' feeds/packages/lang/rust/Makefile
        grep -q -- '--ci false \\' feeds/packages/lang/rust/Makefile || sed -i '/x\.py \\/a \        --ci false \\' feeds/packages/lang/rust/Makefile
        
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load custom configuration
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P2_SH
        
        # 🚀 强制关闭极其耗时的全量内核模块编译
        sed -i 's/CONFIG_ALL_KMODS=y/# CONFIG_ALL_KMODS is not set/' .config
        sed -i 's/CONFIG_ALL_NONSHARED=y/# CONFIG_ALL_NONSHARED is not set/' .config
        echo "CONFIG_CCACHE=y" >> .config
        make defconfig

    - name: Download package
      id: package
      run: |
        cd openwrt
        make download -j8
        # 清理下载失败的残损包并重试一次
        find dl -size -1024c -exec rm -f {} \;
        make download -j8

    - name: Compile the firmware
      id: compile
      run: |
        cd openwrt
        export CCACHE_DIR=~/.ccache
        ccache -M 5G  # 限制 ccache 大小防止超出 Action 10G 总上限
        
        echo -e "$(nproc) thread compile"
        # 优先多线程，失败自动切换单线程 V=s 输出日志
        make -j$(nproc) || make -j1 V=s
        
        echo "status=success" >> $GITHUB_OUTPUT
        grep '^CONFIG_TARGET.*DEVICE.*=y' .config | sed -r 's/.*DEVICE_(.*)=y/\1/' > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=_$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=_$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: Organize files
      id: organize
      if: env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "status=success" >> $GITHUB_OUTPUT

    - name: Upload firmware directory
      uses: actions/upload-artifact@v4
      if: steps.organize.outputs.status == 'success' && !cancelled()
      with:
        name: OpenWrt_firmware${{ env.DEVICE_NAME }}${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: Delete workflow runs
      uses: Mattraks/delete-workflow-runs@main
      with:
        retain_days: 0
        keep_minimum_runs: 2
